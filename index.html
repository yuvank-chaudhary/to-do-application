<!doctype html>
<html>
  <head>
    <TITL>TO-DO APPLICATION</TITL>
    <link href="./style.css" rel="stylesheet" />
  </head>
  <body>
    <div class="nevbar"></div>

    <div class="both">
      <div class="to-do">
        <h1><div class="list">TO-DO LIST</div></h1>
        <label class="task-row">
            <input type="checkbox" name="task" value="done" class="box" />
            <input
              type="text"
              name="task"
              placeholder="Enter task 1"
              class="text_box"
            />
        </label>

        <lebal class="task-row">
            <input type="checkbox" name="task" value="done" class="box" />
            <input
              type="text"
              name="task"
              placeholder="Enter task 2"
              class="text_box"
            />
        </lebal>

        <lebal class="task-row">
            <input type="checkbox" name="task" value="done" class="box" />
            <input
              type="text"
              name="task"
              placeholder="Enter task 2"
              class="text_box"
            />
        </lebal>

        <lebal class="task-row">
            <input type="checkbox" name="task" value="done" class="box" />
            <input
              type="text"
              name="task"
              placeholder="Enter task 4"
              class="text_box"
            />
        </lebal>

        <lebal class="task-row">
            <input type="checkbox" name="task" value="done" class="box" />
            <input
              type="text"
              name="task"
              placeholder="Enter task 2"
              class="text_box"
            />
        </lebal>

        <lebal class="task-row">
            <input type="checkbox" name="task" value="done" class="box" />
            <input
              type="text"
              name="task"
              placeholder="Enter task 2"
              class="text_box"
            />
        </lebal>

        <lebal class="task-row">
            <input type="checkbox" name="task" value="done" class="box" />
            <input
              type="text"
              name="task"
              placeholder="Enter task 2"
              class="text_box"
            />
        </lebal>
      </div>






      <div class="fixing">
      <!-------------------------------- clock -------------------------------------->
      <div class="container">
        <div class="clock">
          <div style="--clr: #ff3d58; --h: 75px" class="hand" id="hrs">
            <i></i>
          </div>
          <div style="--clr: #00a6ff; --h: 90px" class="hand" id="mint">
            <i></i>
          </div>
          <div style="--clr: #fff; --h: 60px" class="hand" id="sec">
            <i></i>
          </div>
          <span style="--i: 1"><b>1</b></span>
          <span style="--i: 2"><b>2</b></span>
          <span style="--i: 3"><b>3</b></span>
          <span style="--i: 4"><b>4</b></span>
          <span style="--i: 5"><b>5</b></span>
          <span style="--i: 6"><b>6</b></span>
          <span style="--i: 7"><b>7</b></span>
          <span style="--i: 8"><b>8</b></span>
          <span style="--i: 9"><b>9</b></span>
          <span style="--i: 10"><b>10</b></span>
          <span style="--i: 11"><b>11</b></span>
          <span style="--i: 12"><b>12</b></span>
        </div>
      </div>
      </div>
    </div>
  </body>
  <script src="./first.js"></script>
</html>
